version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/terraform/branch-protection"
    schedule:
      interval: "weekly"
    groups:
      terraform:
        patterns:
          - "*"
