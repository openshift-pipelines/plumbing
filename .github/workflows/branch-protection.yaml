name: Branch Protection

on:
  pull_request:
    paths:
      - "config/repos.yaml"
      - "terraform/branch-protection/**"
  push:
    branches: [main]
    paths:
      - "config/repos.yaml"
      - "terraform/branch-protection/**"
  schedule:
    # Daily drift detection at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      command:
        description: "Terraform command to run"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  contents: read
  pull-requests: write # post plan output as PR comment

env:
  TF_DIR: terraform/branch-protection

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.command || 'plan' }}
    # Only run in the upstream repo, not in forks
    if: github.repository == 'openshift-pipelines/plumbing'
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.BRANCH_PROTECTION_APP_ID }}
          private-key: ${{ secrets.BRANCH_PROTECTION_APP_PRIVATE_KEY }}
          owner: openshift-pipelines

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `### Terraform Plan 📋

            \`\`\`
            ${truncated}
            \`\`\`

            *Triggered by: ${context.actor}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != ''
        run: exit 1

      - name: Terraform Apply
        if: github.event.inputs.command == 'apply'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false tfplan
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
