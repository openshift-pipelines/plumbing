name: Branch Protection

on:
  pull_request:
    paths:
      - "config/repos.yaml"
      - "terraform/branch-protection/**"
  push:
    branches: [main]
    paths:
      - "config/repos.yaml"
      - "terraform/branch-protection/**"
  schedule:
    # Daily drift detection at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      command:
        description: "Terraform command to run"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  contents: write # read for checkout + write for saving state to terraform-state branch
  pull-requests: write # post plan output as PR comment

env:
  TF_DIR: terraform/branch-protection
  STATE_BRANCH: terraform-state
  STATE_FILE: branch-protection.tfstate

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.command || 'plan' }}
    # Only run in the upstream repo, not in forks
    if: github.repository == 'openshift-pipelines/plumbing'
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.PLUMBING_APP_ID }}
          private-key: ${{ secrets.PLUMBING_APP_PRIVATE_KEY }}
          owner: openshift-pipelines

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore Terraform state
        id: restore_state
        run: |
          set +e
          # Fetch state file from the terraform-state branch
          RESPONSE=$(gh api \
            "repos/${{ github.repository }}/contents/${{ env.STATE_FILE }}?ref=${{ env.STATE_BRANCH }}" \
            2>/dev/null)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ] && echo "$RESPONSE" | jq -e '.content' > /dev/null 2>&1; then
            echo "$RESPONSE" | jq -r '.content' | base64 -d > "${{ env.TF_DIR }}/terraform.tfstate"
            echo "restored=true" >> "$GITHUB_OUTPUT"
            echo "State file restored from ${{ env.STATE_BRANCH }} branch"
          else
            echo "restored=false" >> "$GITHUB_OUTPUT"
            echo "No existing state file found, starting fresh"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `### Terraform Plan 📋

            \`\`\`
            ${truncated}
            \`\`\`

            *Triggered by: ${context.actor}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != ''
        run: exit 1

      - name: Terraform Apply
        if: github.event.inputs.command == 'apply'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false tfplan
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Save Terraform state
        if: github.event.inputs.command == 'apply' && !cancelled()
        run: |
          STATE_PATH="${{ env.TF_DIR }}/terraform.tfstate"
          if [ ! -f "$STATE_PATH" ]; then
            echo "No state file to save"
            exit 0
          fi

          # Get current file SHA if it exists (needed for updates)
          FILE_SHA=$(gh api \
            "repos/${{ github.repository }}/contents/${{ env.STATE_FILE }}?ref=${{ env.STATE_BRANCH }}" \
            --jq '.sha' 2>/dev/null || echo "")

          # Upload state file to the terraform-state branch
          CONTENT=$(base64 -w0 "$STATE_PATH")
          if [ -n "$FILE_SHA" ]; then
            gh api "repos/${{ github.repository }}/contents/${{ env.STATE_FILE }}" \
              -X PUT \
              -f message="Update branch-protection state" \
              -f content="$CONTENT" \
              -f branch="${{ env.STATE_BRANCH }}" \
              -f sha="$FILE_SHA" \
              --silent
          else
            gh api "repos/${{ github.repository }}/contents/${{ env.STATE_FILE }}" \
              -X PUT \
              -f message="Initial branch-protection state" \
              -f content="$CONTENT" \
              -f branch="${{ env.STATE_BRANCH }}" \
              --silent
          fi
          echo "State saved to ${{ env.STATE_BRANCH }} branch"
        env:
          GH_TOKEN: ${{ github.token }}
